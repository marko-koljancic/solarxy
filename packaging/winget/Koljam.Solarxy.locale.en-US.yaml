ShortDescription: 3D model viewer and validator built with Rust and wgpu.
Description: |-
  Solarxy is a cross-platform 3D model viewer, visual debugger, and
  validator built in Rust with wgpu. It loads OBJ, STL, PLY, and
  glTF/GLB models with real-time PBR shading, multiple inspection modes
  (material ID, UV map, texel density, depth), validation overlays, and
  a companion CLI (solarxy-cli) for scripted analysis.
