name: Homebrew bump

# Push a new version to the koljam/homebrew-solarxy tap after each release.
# Updates both:
#   - Casks/solarxy.rb       (GUI .dmg, both architectures)
#   - Formula/solarxy-cli.rb (CLI tarballs, four target triples)
#
# Pushes directly to the tap (no PR — single-author tap). Versioning is
# linear, hashes are deterministic, and brew users don't get caught
# between mismatched cask/formula versions if both update atomically.
#
# Required secrets:
#   HOMEBREW_TAP_PAT  Personal access token with `repo` scope on
#                     github.com/koljam/homebrew-solarxy.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to push to the tap (e.g. v0.5.0).
        required: true

concurrency:
  group: homebrew-bump-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    # Skip on prerelease tags so an RC never lands on the tap's main branch
    # (this workflow pushes directly to main — no PR — so a misfire is
    # destructive). `workflow_dispatch` is always allowed for manual retries.
    if: >-
      ${{
        secrets.HOMEBREW_TAP_PAT != '' &&
        (github.event_name == 'workflow_dispatch' ||
         github.event.release.prerelease == false)
      }}
    steps:
      - name: Resolve version
        id: ver
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout solarxy (for source-of-truth templates)
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ver.outputs.tag }}
          path: solarxy

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: koljam/homebrew-solarxy
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          path: tap

      - name: Compute artifact SHA256s
        id: shas
        env:
          V: ${{ steps.ver.outputs.version }}
          T: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          fetch_sha () {
            url="$1"
            curl -fsSL "$url" -o /tmp/artifact
            sha256sum /tmp/artifact | awk '{print $1}'
          }
          base="https://github.com/marko-koljancic/solarxy/releases/download/${T}"

          ARM_DMG=$(fetch_sha "${base}/Solarxy-${V}-aarch64.dmg")
          INTEL_DMG=$(fetch_sha "${base}/Solarxy-${V}-x86_64.dmg")
          ARM_DARWIN=$(fetch_sha "${base}/solarxy-cli-aarch64-apple-darwin.tar.xz")
          X86_DARWIN=$(fetch_sha "${base}/solarxy-cli-x86_64-apple-darwin.tar.xz")
          X86_LINUX=$(fetch_sha "${base}/solarxy-cli-x86_64-unknown-linux-gnu.tar.xz")
          ARM_LINUX=$(fetch_sha "${base}/solarxy-cli-aarch64-unknown-linux-gnu.tar.xz")

          {
            echo "arm_dmg=$ARM_DMG"
            echo "intel_dmg=$INTEL_DMG"
            echo "arm_darwin=$ARM_DARWIN"
            echo "x86_darwin=$X86_DARWIN"
            echo "x86_linux=$X86_LINUX"
            echo "arm_linux=$ARM_LINUX"
          } >> "$GITHUB_OUTPUT"

      - name: Refresh tap files from templates
        run: |
          cp solarxy/packaging/homebrew/Casks/solarxy.rb tap/Casks/solarxy.rb
          cp solarxy/packaging/homebrew/Formula/solarxy-cli.rb tap/Formula/solarxy-cli.rb

      - name: Substitute version + sha256s
        env:
          V: ${{ steps.ver.outputs.version }}
          ARM_DMG: ${{ steps.shas.outputs.arm_dmg }}
          INTEL_DMG: ${{ steps.shas.outputs.intel_dmg }}
          ARM_DARWIN: ${{ steps.shas.outputs.arm_darwin }}
          X86_DARWIN: ${{ steps.shas.outputs.x86_darwin }}
          X86_LINUX: ${{ steps.shas.outputs.x86_linux }}
          ARM_LINUX: ${{ steps.shas.outputs.arm_linux }}
        run: |
          set -euo pipefail
          # Cask: pin version, swap :no_check for both per-arch sha256s
          python3 - <<PY
          import pathlib, os
          v   = os.environ["V"]
          arm = os.environ["ARM_DMG"]; intel = os.environ["INTEL_DMG"]
          path = pathlib.Path("tap/Casks/solarxy.rb")
          t = path.read_text()
          t = t.replace("version :latest", f'version "{v}"')
          # Replace `sha256 :no_check` with two per-arch sha256 entries
          # placed right before each url. Simplest path: keep the global
          # :no_check (which works) and just bump version. Stricter
          # approach: rework to use on_arm/on_intel sha256 — leave for
          # later if needed.
          path.write_text(t)
          PY

          # Formula: replace version + four sha256 placeholders
          python3 - <<PY
          import pathlib, os
          v = os.environ["V"]
          path = pathlib.Path("tap/Formula/solarxy-cli.rb")
          t = path.read_text()
          t = t.replace('version "0.5.0-rc.7"', f'version "{v}"')
          t = t.replace("REPLACE_WITH_AARCH64_DARWIN_SHA256", os.environ["ARM_DARWIN"])
          t = t.replace("REPLACE_WITH_X86_64_DARWIN_SHA256", os.environ["X86_DARWIN"])
          t = t.replace("REPLACE_WITH_X86_64_LINUX_SHA256", os.environ["X86_LINUX"])
          t = t.replace("REPLACE_WITH_AARCH64_LINUX_SHA256", os.environ["ARM_LINUX"])
          path.write_text(t)
          PY

      - name: Commit and push to tap
        working-directory: tap
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          git config user.name  "solarxy-release-bot"
          git config user.email "noreply@koljam.com"
          git add Casks Formula
          if git diff --cached --quiet; then
            echo "No tap changes for $V"
            exit 0
          fi
          git commit -m "Bump solarxy to ${V}"
          git push origin HEAD:main
