name: Flathub bump

# Push a new release to Flathub. Runs after a GitHub release is published,
# checks out the dedicated Flathub repo (github.com/flathub/dev.koljam.solarxy),
# regenerates cargo-sources.json against the new Cargo.lock, bumps the
# release tarball URL + sha256, and opens a PR for the Flathub maintainers
# to merge.
#
# Required secrets:
#   FLATHUB_PAT  Personal access token (or GitHub App token) with `repo`
#                scope on github.com/flathub/dev.koljam.solarxy.
#
# This workflow runs *after* the release exists, so the dist-manifest is
# stable and the source tarball checksum is reproducible.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to push to Flathub (e.g. v0.5.0).
        required: true

concurrency:
  group: flathub-bump-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    if: ${{ secrets.FLATHUB_PAT != '' }}
    steps:
      - name: Resolve tag and version
        id: ver
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout solarxy (for Cargo.lock + manifest templates)
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ver.outputs.tag }}
          path: solarxy

      - name: Checkout Flathub repo
        uses: actions/checkout@v4
        with:
          repository: flathub/dev.koljam.solarxy
          token: ${{ secrets.FLATHUB_PAT }}
          path: flathub
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install flatpak-cargo-generator dependencies
        run: pip install aiohttp toml

      - name: Regenerate cargo-sources.json
        run: |
          cd solarxy
          ./packaging/flatpak/generate-sources.sh
          cp packaging/flatpak/cargo-sources.json ../flathub/cargo-sources.json

      - name: Compute release tarball SHA256
        id: tarball
        run: |
          URL="https://github.com/marko-koljancic/solarxy/archive/refs/tags/${{ steps.ver.outputs.tag }}.tar.gz"
          curl -fsSL "$URL" -o release.tar.gz
          SHA=$(sha256sum release.tar.gz | awk '{print $1}')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Patch Flathub manifest
        run: |
          cd flathub
          # Replace the `type: dir` source with the release archive.
          # Maintainers usually keep the manifest hand-edited; the bump
          # commit is small and easy to review.
          python3 - <<'PY'
          import re, sys, pathlib
          path = pathlib.Path("dev.koljam.solarxy.yaml")
          text = path.read_text()
          # naive but stable: swap the dir-source block for an archive block
          text = re.sub(
              r"      - type: dir\n        path: \.\./\.\.\n",
              f"      - type: archive\n        url: ${{ steps.tarball.outputs.url }}\n        sha256: ${{ steps.tarball.outputs.sha256 }}\n",
              text,
          )
          path.write_text(text)
          PY

      - name: Open PR on Flathub repo
        uses: peter-evans/create-pull-request@v6
        with:
          path: flathub
          token: ${{ secrets.FLATHUB_PAT }}
          branch: bump/${{ steps.ver.outputs.tag }}
          commit-message: "Bump to ${{ steps.ver.outputs.version }}"
          title: "Bump to ${{ steps.ver.outputs.version }}"
          body: |
            Auto-bump from upstream release ${{ steps.ver.outputs.tag }}.

            - Source tarball: ${{ steps.tarball.outputs.url }}
            - SHA256: `${{ steps.tarball.outputs.sha256 }}`
            - cargo-sources.json regenerated against Cargo.lock at this tag.
