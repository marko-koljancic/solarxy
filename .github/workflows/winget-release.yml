name: Winget release

# Submit the new MSI to microsoft/winget-pkgs after each release.
# Uses vedantmgoyal9/winget-releaser, which fetches the MSI, computes
# the hash, fills in the manifest from packaging/winget/, and opens a
# PR against microsoft/winget-pkgs.
#
# Required secrets:
#   WINGET_PAT  Personal access token with `public_repo` scope on
#               microsoft/winget-pkgs (the bot pushes a branch on the
#               user's fork; the PR is to the upstream).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to push to winget-pkgs (e.g. v0.5.0).
        required: true

concurrency:
  group: winget-release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest
    if: ${{ secrets.WINGET_PAT != '' }}
    steps:
      - name: Submit to winget-pkgs
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Koljam.Solarxy
          version: ${{ github.event.release.tag_name && format('{0}', github.event.release.tag_name) || inputs.tag }}
          installers-regex: '^solarxy-.*\.msi$'
          token: ${{ secrets.WINGET_PAT }}
          # Strip the leading `v` from the tag for the package version
          # (winget rejects vX.Y.Z, expects X.Y.Z).
          fork-user: ${{ github.repository_owner }}
