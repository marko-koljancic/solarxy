name: Native Bundle

# Builds DMG (macOS), .deb (Debian/Ubuntu), and AppImage (x86_64 Linux)
# and uploads them to a GitHub Release.
#
# Invocation:
#   - `workflow_call` — called by cargo-dist's release.yml as a reusable
#     workflow via the `post-announce-jobs` hook (see dist-workspace.toml).
#     Runs in the same workflow graph as the release, so the GITHUB_TOKEN
#     chain restriction on `release: published` does not apply. The `plan`
#     input carries cargo-dist's dist-manifest payload; we extract the tag
#     from `announcement_tag`.
#   - `workflow_dispatch` — manual run for ad-hoc uploads against an
#     existing release tag. Kept for debugging / retries without retagging.

on:
  workflow_call:
    inputs:
      plan:
        description: cargo-dist dist-manifest JSON payload.
        type: string
        required: true
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v0.5.0). Artifacts upload to that release.
        required: true

permissions:
  contents: write        # gh release upload

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14            # Apple Silicon
          - target: x86_64-apple-darwin
            runner: macos-13            # Intel — last Intel runner on GH-hosted
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      TAG: ${{ github.event_name == 'workflow_call' && fromJson(inputs.plan).announcement_tag || inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup default stable && rustup target add ${{ matrix.target }}

      # --release (not --profile dist) so cargo-deb's `assets = ["target/release/..."]`
      # path resolves correctly. cargo-deb auto-adjusts to `target/<triple>/release/`
      # when `--target` is passed. The binary quality delta (thin-LTO vs fat-LTO)
      # is negligible inside a .app / .deb / .AppImage payload.
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Bundle via composite action
        id: bundle
        uses: ./.github/actions/native-bundle
        with:
          target: ${{ matrix.target }}
          version: ${{ env.TAG }}
          binary-path: target/${{ matrix.target }}/release/solarxy

      - name: Upload bundles to release
        if: hashFiles('bundle-out/*') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$TAG" bundle-out/* --clobber
