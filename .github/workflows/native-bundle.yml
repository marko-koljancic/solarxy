name: Native Bundle

# Builds DMG (macOS) and AppImage (x86_64 Linux), then uploads them to a
# GitHub Release. Linux GUI is also published to Flathub via a separate
# workflow (.github/workflows/flathub-bump.yml). MSI is built by
# cargo-dist's own job and uploaded by it; this workflow does not touch it.
# .deb / .rpm were dropped in v0.5.0-rc.7.
#
# Invocation:
#   - `workflow_call` — called by cargo-dist's release.yml as a reusable
#     workflow via the `post-announce-jobs` hook (see dist-workspace.toml).
#     Runs in the same workflow graph as the release, so the GITHUB_TOKEN
#     chain restriction on `release: published` does not apply. The `plan`
#     input carries cargo-dist's dist-manifest payload; we extract the tag
#     from `announcement_tag`.
#   - `workflow_dispatch` — manual run for ad-hoc uploads against an
#     existing release tag. Kept for debugging / retries without retagging.

on:
  workflow_call:
    inputs:
      plan:
        description: cargo-dist dist-manifest JSON payload.
        type: string
        required: true
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v0.5.0). Artifacts upload to that release.
        required: true

permissions:
  contents: write        # gh release upload

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14            # Apple Silicon
          - target: x86_64-apple-darwin
            runner: macos-15-intel      # Intel — matches cargo-dist's own matrix; macos-13 was retired
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      # Detect invocation mode by input presence: `github.event_name` in a
      # reusable workflow reflects the CALLER's event (`push` for tag builds),
      # not `workflow_call`, so we can't key off it. `&&` short-circuits so
      # fromJson is only evaluated when inputs.plan is non-empty.
      TAG: ${{ inputs.plan != '' && fromJson(inputs.plan).announcement_tag || inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup default stable && rustup target add ${{ matrix.target }}

      # --release (not --profile dist) for stable cross-target asset paths.
      # The binary quality delta (thin-LTO vs fat-LTO) is negligible inside
      # a .app / .AppImage payload. Both bins (`solarxy` and `solarxy-cli`)
      # are built so the macOS .app can embed the CLI alongside the GUI.
      - name: Build release binaries (GUI + CLI)
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Bundle via composite action
        id: bundle
        uses: ./.github/actions/native-bundle
        with:
          target: ${{ matrix.target }}
          version: ${{ env.TAG }}
          binary-path: target/${{ matrix.target }}/release/solarxy
          cli-binary-path: target/${{ matrix.target }}/release/solarxy-cli

      - name: Upload bundles to release
        if: hashFiles('bundle-out/*') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$TAG" bundle-out/* --clobber
