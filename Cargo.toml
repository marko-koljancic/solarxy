[package]
name = "solarxy"
description = "Cross platform model viewer and checker powered by WGPU and Rust."
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT"
repository = "https://github.com/marko-koljancic/solarxy"

[profile.release]
strip = true

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"

[dependencies]
clap = { version = "4.5.53", features = ["derive"] }
anyhow = "1.0.100"
winit = "0.30.12"
wgpu = "27.0.1"
pollster = "0.4.0"
bytemuck = { version = "1.24", features = ["derive"] }
cgmath = "0.18"
tobj = { version = "4.0.3", default-features = false }
stl_io = "0.7"
wgpu_text = "27.0.1"
crossterm = "0.28.1"
ratatui = "0.29.0"
ply-rs-bw = "3.0.3"
gltf = "1.4"
chrono = "0.4.44"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dependencies.image]
version = "0.25.9"
default-features = false
features = ["png", "jpeg", "webp"]

[build-dependencies]
anyhow = "1.0"
fs_extra = "1.2"
glob = "0.3"
