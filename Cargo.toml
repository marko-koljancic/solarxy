[package]
name = "solarxy"
description = "Cross platform model viewer and checker powered by WGPU and Rust."
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/marko-koljancic/solarxy"

[profile.release]
strip = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
clap = { version = "4.5.53", features = ["derive"] }
anyhow = "1.0.100"
winit = "0.30.12"
wgpu = "27.0.1"
pollster = "0.4.0"
bytemuck = { version = "1.24", features = ["derive"] }
cgmath = "0.18"
tobj = { version = "4.0.3", default-features = false, features = ["async"] }
color-eyre = "0.6.3"
crossterm = "0.28.1"
ratatui = "0.29.0"

[dependencies.image]
version = "0.25.9"
default-features = false
features = ["png", "jpeg"]

[build-dependencies]
anyhow = "1.0"
fs_extra = "1.2"
glob = "0.3"
