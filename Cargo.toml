[package]
name = "solarxy"
description = "A lightweight, cross-platform 3D model viewer and validator built with Rust and wgpu. Inspect 3D models in a real-time graphical viewer or analyze them from the terminal with built-in validation checks."
version = "0.3.1-alpha"
edition = "2024"
rust-version = "1.85"
license = "MIT"
repository = "https://github.com/marko-koljancic/solarxy"

[profile.release]
strip = true

[profile.dist]
inherits = "release"
lto = "thin"

[features]
default = ["viewer", "analyzer", "tui"]
viewer = [
    "analyzer",
    "dep:wgpu",
    "dep:winit",
    "dep:wgpu_text",
    "dep:pollster",
    "dep:image",
    "dep:bytemuck",
    "dep:half",
    "dep:exr",
]
analyzer = ["dep:tobj", "dep:stl_io", "dep:ply-rs-bw", "dep:gltf"]
tui = ["dep:ratatui", "dep:crossterm"]

[dependencies]
# Always required
clap = { version = "4.5.53", features = ["derive"] }
anyhow = "1.0.100"
cgmath = "0.18"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
dirs = "6.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Viewer dependencies (optional)
winit = { version = "0.30.12", optional = true }
wgpu = { version = "27.0.1", optional = true }
pollster = { version = "0.4.0", optional = true }
bytemuck = { version = "1.24", features = ["derive"], optional = true }
wgpu_text = { version = "27.0.1", optional = true }
half = { version = "2.0", optional = true }
exr = { version = "1.0", optional = true }

# Analyzer dependencies (optional)
tobj = { version = "4.0.3", default-features = false, optional = true }
stl_io = { version = "0.7", optional = true }
ply-rs-bw = { version = "3.0.3", optional = true }
gltf = { version = "1.4", optional = true }

# TUI dependencies (optional)
crossterm = { version = "0.28.1", optional = true }
ratatui = { version = "0.29.0", optional = true }

[dependencies.image]
version = "0.25.9"
default-features = false
features = ["png", "jpeg", "webp", "hdr"]
optional = true

[build-dependencies]
anyhow = "1.0"
fs_extra = "1.2"
glob = "0.3"
